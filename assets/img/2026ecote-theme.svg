<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="ECOTE cover image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8fd"/>
      <stop offset="55%" stop-color="#f8eef7"/>
      <stop offset="100%" stop-color="#f2e7f1"/>
